steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/kol-fetch/trademind-backend:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/kol-fetch/trademind-backend:latest'
      - '.'
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/kol-fetch/trademind-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/kol-fetch/trademind-backend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trademind-backend'
      - '--image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/kol-fetch/trademind-backend:$COMMIT_SHA'
      - '--region=asia-southeast1'

options:
  logging: CLOUD_LOGGING_ONLY
